# OctoAuthor Docker Compose - Tool Platform Setup
#
# This runs OctoAuthor as a locked-down service that external orchestrators
# (OpenClaw, etc.) connect to remotely via Streamable HTTP (MCP).
#
# Port configuration:
# All ports are configurable via .env file (OCTOAUTHOR_ prefix).
#
# Security model:
# - Read-only filesystem (except /workspace volume)
# - No shell access, no privilege escalation
# - Network limited to exposed ports only
# - Non-root user
# - Resource limits enforced

services:
  octoauthor:
    build: .
    container_name: octoauthor-platform
    restart: unless-stopped
    env_file: .env

    # --- Security: drop all capabilities, no privilege escalation ---
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true

    # --- Writable volumes (minimal) ---
    volumes:
      # Workspace: where generated docs and screenshots go
      - octoauthor-workspace:/workspace
      # Temp dir needed by Python/Playwright
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 256M
      # uv cache dir (read-only filesystem workaround)
      - type: tmpfs
        target: /home/octoauthor/.cache
        tmpfs:
          size: 64M
      # Chrome config/crashpad data (needed for headed mode in VNC auth flow)
      - type: tmpfs
        target: /home/octoauthor/.config
        tmpfs:
          size: 32M

    # --- Resource limits ---
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "0.5"

    # --- Networking ---
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${OCTOAUTHOR_API_PORT:-9210}:${OCTOAUTHOR_API_PORT:-9210}"
      # noVNC: interactive browser for SSO auth flows
      - "6080:6080"

    # --- Environment ---
    # Most settings come from .env via env_file above.
    # Override container-specific values here.
    environment:
      - OCTOAUTHOR_DOC_OUTPUT_DIR=/workspace/docs
      - OCTOAUTHOR_SCREENSHOT_OUTPUT_DIR=/workspace/screenshots
      # socat forwards localhost:<port> inside the container to the host IP,
      # so the browser sees "localhost" — keeping cookies/sessions intact.
      # Disable URL rewriting since socat makes localhost work directly.
      - OCTOAUTHOR_TARGET_HOST=
      # socat config: host IP and ports to forward
      - SOCAT_TARGET_HOST=${OCTOAUTHOR_TARGET_HOST:-}
      - OCTOAUTHOR_TARGET_PORTS=${OCTOAUTHOR_TARGET_PORTS:-}
      # Code reader: configure in .env (defaults to local filesystem at '.')
      - OCTOAUTHOR_CODE_SOURCE_TYPE=${OCTOAUTHOR_CODE_SOURCE_TYPE:-local}
      - OCTOAUTHOR_CODE_SOURCE_PATH=${OCTOAUTHOR_CODE_SOURCE_PATH:-.}
      - OCTOAUTHOR_CODE_GITHUB_REF=${OCTOAUTHOR_CODE_GITHUB_REF:-main}

    # --- Health check ---
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import httpx; httpx.get('http://localhost:${OCTOAUTHOR_API_PORT:-9210}/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  octoauthor-workspace:
    driver: local
