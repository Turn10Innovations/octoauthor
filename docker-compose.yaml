# OctoAuthor Docker Compose - Tool Platform Setup
#
# This runs OctoAuthor as a locked-down service that external orchestrators
# (OpenClaw, etc.) connect to remotely via HTTP+SSE.
#
# Port configuration:
# All ports are configurable via .env file (OCTOAUTHOR_ prefix).
# Copy .env.example to .env and adjust as needed.
#
# Security model:
# - Read-only filesystem (except /workspace volume)
# - No shell access, no privilege escalation
# - Network limited to exposed ports only
# - Non-root user
# - Resource limits enforced
# - All egress blocked except allowlisted domains

services:
  octoauthor:
    build: .
    container_name: octoauthor-platform
    restart: unless-stopped
    env_file: .env

    # --- Security: drop all capabilities, no privilege escalation ---
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true

    # --- Writable volumes (minimal) ---
    volumes:
      # Workspace: where generated docs and screenshots go
      - octoauthor-workspace:/workspace
      # Temp dir needed by Python/Playwright
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 256M

    # --- Resource limits ---
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "0.5"

    # --- Ports exposed to the network ---
    # All ports are read from .env via the OCTOAUTHOR_ prefix.
    # The container listens on the same port internally and externally.
    ports:
      - "${OCTOAUTHOR_API_PORT:-9210}:${OCTOAUTHOR_API_PORT:-9210}"
      - "${OCTOAUTHOR_MCP_PORT_SCREENSHOT:-9211}:${OCTOAUTHOR_MCP_PORT_SCREENSHOT:-9211}"
      - "${OCTOAUTHOR_MCP_PORT_DOC_WRITER:-9212}:${OCTOAUTHOR_MCP_PORT_DOC_WRITER:-9212}"
      - "${OCTOAUTHOR_MCP_PORT_DOC_STORE:-9213}:${OCTOAUTHOR_MCP_PORT_DOC_STORE:-9213}"
      - "${OCTOAUTHOR_MCP_PORT_VISUAL_QA:-9214}:${OCTOAUTHOR_MCP_PORT_VISUAL_QA:-9214}"
      - "${OCTOAUTHOR_MCP_PORT_APP_INSPECTOR:-9215}:${OCTOAUTHOR_MCP_PORT_APP_INSPECTOR:-9215}"

    # --- Environment ---
    # Most settings come from .env via env_file above.
    # Only override container-specific paths here.
    environment:
      - OCTOAUTHOR_DOC_OUTPUT_DIR=/workspace/docs
      - OCTOAUTHOR_SCREENSHOT_OUTPUT_DIR=/workspace/screenshots

    # --- Health check ---
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import httpx; httpx.get('http://localhost:${OCTOAUTHOR_API_PORT:-9210}/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  octoauthor-workspace:
    driver: local
