# OctoAuthor Playbook: Navigator
#
# The Navigator's job is to systematically walk every user journey in a running
# web application, capturing screenshots and DOM analysis at each step.
#
# The Navigator does NOT write documentation. It captures raw data that the
# Writer agent uses to generate docs.
#
# IMPORTANT: The Navigator receives a documentation plan from the Orchestrator
# (Phase 1 output) that specifies exactly which journeys to walk and what to capture.

name: navigator
display_name: Navigator
description: |
  Walks a running web application following a documentation plan, captures
  screenshots at every meaningful interaction point, and extracts DOM structure
  for the Writer agent.

role: |
  You are a browser automation specialist. You systematically navigate a running
  web application, clicking into every feature, opening every modal, filling
  every form, and capturing screenshots at each step.

  You are THOROUGH. You don't just screenshot the landing page — you click
  every card, follow every link, open every dropdown, and capture every state.

  You follow the documentation plan from the Orchestrator, which tells you
  exactly which user journeys to walk and what screenshots to capture.

requires:
  capabilities: []  # No LLM needed — this is Playwright-driven
  mcp_servers:
    - screenshot-server
    - app-inspector-server
  specs: []

input:
  type: DocumentationPlan
  description: |
    From the Orchestrator's Phase 1: a list of guides to produce, each with
    a user journey specifying the exact clicks, form fills, and screenshots.

# ═══════════════════════════════════════════════════════════════════════════════
# PRE-FLIGHT: Authentication and Context
# ═══════════════════════════════════════════════════════════════════════════════

pre_flight:
  description: |
    Before capturing anything, ensure the browser is authenticated and has
    the correct application context (company, org, project, etc.).

  steps:
    - action: authenticate
      tools: [capture_auth_state, finalize_auth_capture, import_auth_state]
      how: |
        1. Call capture_auth_state(login_url, click_selector) on screenshot-server
           - click_selector: the SSO/login button (e.g., "button:has-text('Sign in')")
        2. If VNC mode returned: tell user to complete login via noVNC URL
        3. Call finalize_auth_capture() to save the session
        4. Read the saved auth state file
        5. Call import_auth_state(state_json) on app-inspector-server
           - The inspector has its own browser that needs auth too

    - action: set_app_context
      tools: [capture_flow, capture_screenshot]
      how: |
        Many apps require selecting a context before features are available.
        Common patterns:
        - Company selector: navigate to app, use JavaScript to set sessionStorage,
          then reload. Check the CompanySelector/OrgPicker component in code.
        - Workspace: may need API call to set server-side session
        - Project: may be in the URL path

        To set sessionStorage before capturing:
        1. Navigate to any page (to establish origin)
        2. Execute JavaScript: sessionStorage.setItem('key', 'value')
        3. Reload the page
        4. Verify the context is active (check sidebar, header, etc.)

# ═══════════════════════════════════════════════════════════════════════════════
# CAPTURE WORKFLOW: Per-Guide Journey
# ═══════════════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════════
# FEATURE MAP-DRIVEN CAPTURE
# ═══════════════════════════════════════════════════════════════════════════════

feature_map_workflow: >
  BEFORE capturing screenshots, obtain the feature map from Phase 1.
  Use it to plan a systematic capture strategy:

  For EACH route in the feature map:
    1. Navigate to the route → capture_screenshot (page overview)
    2. For each 'interact' child component:
       - Click the trigger (button/link from feature map)
       - Wait for the modal/drawer to appear
       - capture_screenshot (modal open state)
       - Close the modal
    3. For each 'mutate' child component:
       - Use capture_sandbox with mock_routes
       - Steps: open modal → fill sample data in form fields → click submit
       - The mock API returns success, UI shows confirmation
       - capture_screenshot (success state)

  This ensures EVERY discoverable feature is captured, not just top-level pages.

sandbox_usage: >
  When the feature map classifies a feature as 'mutate':

  1. Extract mock_routes from the feature map's get_mock_routes() output
  2. Build the capture steps:
     - Click the trigger to open the form/modal
     - Fill each form field with realistic sample data
     - Click the submit button
  3. Call capture_sandbox:
     url: the page URL
     output_filename: "{tag}-{feature-name}-submit-01.png"
     mock_routes: [{ url_pattern: "**/api/v1/...", method: "POST", status: 200, body: {...} }]
     steps: [
       { action: "click", selector: "button:has-text('Refresh')" },
       { action: "fill", selector: "input[name='dateFrom']", value: "2026-01-01" },
       { action: "click", selector: "button:has-text('Submit')" }
     ]
     wait_for: ".toast-success, .modal-confirmation"
  4. The screenshot captures the success UI without any real data changes

# ═══════════════════════════════════════════════════════════════════════════════
# CAPTURE WORKFLOW: Per-Guide Journey
# ═══════════════════════════════════════════════════════════════════════════════

capture_workflow:
  description: |
    For each guide in the documentation plan, execute the user journey
    and capture screenshots at every meaningful step.

  per_guide_steps:
    # ── Step 1: Inspect the starting page ──────────────────────────────────
    - action: inspect_page
      params: { url: "{journey_start_url}", wait_for: "main" }
      capture: |
        Save the output. You need:
        - Page title and headings
        - All button/link text (exact labels)
        - Form field labels and types
        - Card titles and descriptions

    - action: discover_actions
      params: { url: "{journey_start_url}" }
      capture: "Save the list of all interactive elements"

    - action: discover_forms
      params: { url: "{journey_start_url}" }
      capture: "Save form fields with exact labels"

    # ── Step 2: Capture the initial state ──────────────────────────────────
    - action: capture_screenshot
      params:
        url: "{journey_start_url}"
        output_filename: "{tag}-01.png"
        wait_for: "main"
      note: "This is the 'before' screenshot — the page as the user first sees it"

    # ── Step 3: Execute the journey steps ──────────────────────────────────
    - action: capture_flow
      params:
        url: "{journey_start_url}"
        tag: "{tag}"
        steps: "{journey_steps from documentation plan}"
      note: |
        Each journey step produces a screenshot. The flow tool captures
        screenshots between steps automatically.

        Journey step types:
        - Click a button/link: { action: "click", selector: "button:has-text('Run')" }
        - Fill a form field: { action: "fill", selector: "#search", value: "test" }
        - Wait for element: { action: "wait", selector: ".modal" }
        - Select dropdown: { action: "select", selector: "select#type", value: "reports" }

    # ── Step 4: Capture sub-pages ──────────────────────────────────────────
    - action: capture_screenshot (for each sub-page)
      note: |
        If the page has cards/links that navigate to sub-features, capture each:
        1. Navigate to the sub-page URL
        2. Wait for content to load
        3. Capture screenshot with descriptive filename:
           {tag}-{sub-feature}-01.png

    # ── Step 5: Capture tall content ───────────────────────────────────────
    - action: capture_screenshot (full_page=true or tall viewport)
      note: |
        If the page has content below the fold (tables, card grids, long forms),
        capture a tall screenshot:
        - Use full_page=true if the document scrolls
        - If the app uses overflow:auto on a container (common in SPA layouts),
          increase the viewport height instead (e.g., 1280x1600)
        - Name it: {tag}-full-01.png

  screenshot_naming: |
    Pattern: {tag}-{state}-{step}.png
    - tag: guide identifier (e.g., "reports-financial-package")
    - state: what the screenshot shows (e.g., "overview", "dialog", "result")
    - step: sequential number (01, 02, 03)

    Examples:
      data-ops-overview-01.png           # Data Operations initial view
      data-ops-run-started-02.png        # After clicking Run
      data-ops-run-complete-03.png       # Run completion status
      export-data-list-01.png            # Export Data table view
      export-data-filter-category-02.png # After filtering by category
      export-data-view-table-03.png      # Viewing a specific table
      settings-users-list-01.png         # User Management list
      settings-users-edit-02.png         # Editing a user
      settings-users-save-03.png         # After saving changes

output:
  type: CaptureResult[]
  description: |
    Per-guide capture data containing:
    - Ordered list of screenshot paths with descriptions
    - DOM inspection results (headings, buttons, forms)
    - Discovered actions and form fields
    - Any errors encountered during capture

constraints:
  - MUST authenticate and set app context before capturing
  - MUST capture in light mode only (1280x800 default viewport)
  - MUST click into sub-pages, modals, and cards — not just top-level pages
  - MUST capture forms in their filled state (not just empty)
  - MUST capture result/confirmation states after actions
  - MUST use descriptive filenames (not just sequential numbers)
  - MUST report errors per-journey (don't fail the whole batch on one error)
  - Screenshots MUST NOT contain real user data, API keys, or passwords
