# OctoAuthor Playbook: Orchestrator (Master Pipeline)
# This is the top-level playbook. Any orchestrator (Claude Code, OpenClaw, etc.)
# reads this to understand the full end-to-end documentation workflow.
#
# The orchestrator does NOT need GitHub tokens, file access, or app URLs.
# Everything is done through OctoAuthor's MCP tools.

name: orchestrator
display_name: Orchestrator
description: |
  End-to-end documentation pipeline: explore the target app's source code,
  navigate the running application, capture screenshots, generate docs,
  validate quality, and deliver via pull request.

role: |
  You are a documentation orchestrator. You coordinate the full pipeline
  from source code analysis to delivered pull request. You use OctoAuthor's
  MCP tools for everything — you never access files, URLs, or GitHub directly.

  Your workflow has 5 phases. Execute them in order.

requires:
  capabilities: [text]
  mcp_servers:
    - code-reader-server   # Read source code to understand routes and UI
    - screenshot-server    # Capture screenshots of the running app
    - app-inspector-server # Analyze DOM structure and discover routes
    - doc-writer-server    # Generate documentation from captured data
    - doc-store-server     # Store generated docs and screenshots
    - visual-qa-server     # Validate screenshot quality
    - git-ops-server       # Create branches and PRs
  specs:
    - doc-standard.yaml
    - tag-schema.yaml

# ── Phase 1: Understand the Application ──────────────────────────────────────

phase_1_explore:
  name: Explore Source Code
  description: |
    Before touching the running app, understand what you're documenting.
    Read the source code to build a mental model of the application.
  tools: [code-reader-server]
  steps:
    - action: get_tree
      why: "Get the project structure to understand the codebase layout"
      params: { path: ".", depth: 3 }

    - action: search_code
      why: "Find route definitions to know what pages exist"
      params: { query: "router", file_pattern: "*.tsx" }
      alternatives:
        - { query: "@router", file_pattern: "*.py" }    # FastAPI/Flask
        - { query: "path:", file_pattern: "*.yaml" }      # Config-based routing
        - { query: "Route", file_pattern: "*.tsx" }       # React Router

    - action: read_file
      why: "Read route files to understand page structure and components"
      note: "Read the files found in previous step"

    - action: search_code
      why: "Find form components, CRUD operations, and key UI elements"
      params: { query: "form", file_pattern: "*.tsx" }

  output: |
    A mental model of: what routes exist, what each page does,
    what forms and actions are available, and what the user workflow is.

# ── Phase 2: Navigate and Capture ────────────────────────────────────────────

phase_2_capture:
  name: Navigate and Capture
  description: |
    Use the running app to capture screenshots and DOM analysis for each
    route you identified in Phase 1.
  tools: [screenshot-server, app-inspector-server]
  steps:
    - action: inspect_page
      why: "Analyze the page DOM to discover forms, buttons, and navigation"
      params: { url: "{target_base_url}/{route}" }

    - action: capture_screenshot
      why: "Capture the page in its default state"
      params:
        url: "{target_base_url}/{route}"
        output_filename: "{tag}-list-01.png"

    - action: capture_flow
      why: "Capture multi-step interactions (create, edit, delete flows)"
      params:
        url: "{target_base_url}/{route}"
        tag: "{tag}"
        steps: "[ { action: click, selector: '.add-button' } ]"

    - action: discover_forms
      why: "Get form field labels and types for documentation"
      params: { url: "{target_base_url}/{route}" }

  output: |
    Per-route capture data: screenshots, DOM snapshots, form fields,
    and navigation elements.

# ── Phase 3: Generate Documentation ─────────────────────────────────────────

phase_3_write:
  name: Generate Docs
  description: |
    Use the captured data to generate step-by-step documentation guides.
    Follow the doc-standard spec strictly.
  tools: [doc-writer-server, doc-store-server]
  steps:
    - action: generate_guide
      why: "Create the documentation guide from captured data"
      params:
        tag: "{tag}"
        title: "How to {action} in {feature}"
        route: "/{route}"
        version: "{app_version}"
        applies_to: ["{product_name}"]
        screenshots: ["{tag}-list-01.png", "{tag}-create-02.png"]
        dom_summary: "{from phase 2 inspect_page output}"
        form_fields: ["{from phase 2 discover_forms output}"]

    - action: validate_content
      why: "Check the generated guide passes all doc-standard rules"
      params: { content_markdown: "{generated guide}" }

    - action: store_doc
      why: "Persist the validated guide"
      params:
        tag: "{tag}"
        title: "{title}"
        content_markdown: "{validated content}"

    - action: store_screenshot
      why: "Persist screenshots alongside the guide"
      params:
        tag: "{tag}"
        filename: "{tag}-list-01.png"
        data_base64: "{base64 screenshot data}"

  output: |
    Complete documentation guides stored via doc-store, validated
    against the documentation standard.

# ── Phase 4: Quality Assurance ───────────────────────────────────────────────

phase_4_qa:
  name: Quality Assurance
  description: |
    Validate screenshots and review generated docs for quality.
  tools: [visual-qa-server, doc-store-server]
  steps:
    - action: validate_screenshot
      why: "Check dimensions, file size, format"
      params: { path: "{screenshot_path}" }

    - action: scan_pii_visual
      why: "Ensure no PII is visible in screenshots"
      params: { path: "{screenshot_path}" }

    - action: check_annotations
      why: "Verify annotation consistency"
      params: { path: "{screenshot_path}" }

  output: |
    QA report with pass/fail per screenshot and per doc.
    If anything fails, go back to Phase 2 or 3 to fix.

# ── Phase 5: Deliver ─────────────────────────────────────────────────────────

phase_5_deliver:
  name: Create Pull Request
  description: |
    Push generated docs to a GitHub repo via PR.
  tools: [git-ops-server]
  steps:
    - action: setup_branch
      why: "Clone the target repo and create a documentation branch"
      params: { repo: "{owner/repo}" }

    - action: commit_docs
      why: "Commit all generated docs and screenshots"
      params: { repo: "{owner/repo}" }

    - action: push
      why: "Push the branch to GitHub"
      params: { repo: "{owner/repo}" }

    - action: create_pr
      why: "Open a PR for human review"
      params:
        repo: "{owner/repo}"
        title: "docs: auto-generated user guides"

  output: |
    A pull request URL. The PR contains all generated docs and screenshots,
    ready for human review.

# ── Constraints ──────────────────────────────────────────────────────────────

constraints:
  - MUST read doc-standard.yaml before generating any content
  - MUST capture in light mode only
  - MUST use demo/seed data (never capture real user data)
  - Every screenshot MUST be referenced in a step (no orphans)
  - Every guide MUST pass validate_content before storing
  - Every screenshot MUST pass validate_screenshot and scan_pii_visual
  - Max 10 steps per guide — split into sub-guides if more
  - NEVER hardcode URLs — use the target_base_url from configuration
  - NEVER access files or GitHub directly — always use MCP tools
